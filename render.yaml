services:
  - type: web
    name: jdc-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://jdc-frontend-deployment-url.vercel.app,http://localhost:3000"
      - key: WEB_CONCURRENCY
        value: 4

